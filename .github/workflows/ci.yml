name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install CI dependencies only
        run: |
          python -m pip install --upgrade pip
          # Install only lightweight linting tools — NOT the full requirements.txt
          # (requirements.txt needs Neo4j, Ollama, ChromaDB running locally — not available in CI)
          pip install flake8 black pytest bandit

      - name: Lint — check for syntax errors and undefined names
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint — style warnings (non-blocking)
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Format check with black (non-blocking)
        # Reports formatting issues as info only — does not fail the build
        # Run: black . locally to auto-fix formatting
        run: |
          black --check --diff . || echo "ℹ️  Formatting issues found — run 'black .' locally to fix"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short 2>/dev/null || echo "ℹ️  No tests yet — add tests in /tests folder"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan (non-blocking)
        run: |
          bandit -r . -x tests/ --severity-level medium -f txt || echo "ℹ️  Security warnings found — review above"

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required project files..."
          test -f requirements.txt  && echo "✅ requirements.txt" || echo "❌ requirements.txt missing"
          test -f .env.example      && echo "✅ .env.example"      || echo "❌ .env.example missing"
          test -f README.md         && echo "✅ README.md"          || echo "❌ README.md missing"
          test -f .gitignore        && echo "✅ .gitignore"         || echo "❌ .gitignore missing"
          echo "Structure check complete."
